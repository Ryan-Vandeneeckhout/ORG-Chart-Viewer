<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CommandGridPro</title>
  <link rel="stylesheet" href="shared.css"/>
</head>
<body>
<div class="page">

  <header>
    <div class="header-inner">
      <div class="logo-mark">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="color:var(--teal)">
          <rect x="1"  y="1"  width="11" height="11" stroke="currentColor" stroke-width="1.5"/>
          <rect x="16" y="1"  width="11" height="11" stroke="currentColor" stroke-width="1.5"/>
          <rect x="1"  y="16" width="11" height="11" stroke="currentColor" stroke-width="1.5"/>
          <rect x="16" y="16" width="11" height="11" stroke="currentColor" stroke-width="1.5" fill="currentColor" fill-opacity="0.2"/>
        </svg>
      </div>
      <div>
        <h1 class="brand-title">COMMAND<span>GRID</span>PRO</h1>
        <p class="tagline">Precision Tools. Zero Friction.</p>
      </div>
      <div class="status-badge">
        <span class="status-dot"></span>
        ACTIVE
      </div>
      <button class="settings-btn" onclick="navigateTo('settings.html')" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
    <div class="divider"></div>
  </header>

  <main>
    <p class="section-label">— SELECT MODULE —</p>
    <div class="nav-grid" id="navGrid"></div>
  </main>

  <footer>
    <span class="brand">CFB <span>North Bay</span></span>
    <span class="fsep">×</span>
    <span class="brand">Command<span>Grid</span>Pro</span>
    <span class="fsep" style="margin:0 4px">|</span>
    <span id="cardCount"></span>
    <span class="fsep">|</span>
    <span>v1.0.0</span>
  </footer>

</div>
<script src="shared.js"></script>
<script>

  /* ================================================================
     TOOL CONFIG — edit this array to add/change/reorder cards.

     Fields:
       label   {string}  Text shown on the card
       accent  {string}  Colour: teal | orange | violet | gold |
                         sky | rose | lime | amber | cyan
       icon    {string}  Icon key (see ICONS map below)
       action  {string}  Filename of the destination page
  ================================================================ */
  const TOOLS = [
    { label: 'CSV Compare',      accent: 'teal',   icon: 'file',     action: 'tool-pdf.html'      },
    { label: 'Tool 2',           accent: 'orange', icon: 'grid',     action: 'tool-2.html'        },
    { label: 'Tool 3',           accent: 'violet', icon: 'star',     action: 'tool-3.html'        },
    { label: 'Tool 4',           accent: 'gold',   icon: 'alert',    action: 'tool-4.html'        },
    { label: 'Command Pro All',  accent: 'sky',    icon: 'users',    action: 'tool-cgp.html'      },
    { label: 'Tool 6',           accent: 'rose',   icon: 'radio',    action: 'tool-5.html'        },
    { label: 'Org Chart',        accent: 'cyan',   icon: 'layers',   action: 'tool-orgchart.html' },
  ];

  /* ================================================================
     ICON LIBRARY — SVG path strings for a 24×24 viewBox.
     Add new keys here and reference them via TOOLS[n].icon
  ================================================================ */
  const ICONS = {
    file:     `<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
               <polyline points="14 2 14 8 20 8"/>
               <line x1="8" y1="13" x2="16" y2="13"/>
               <line x1="8" y1="17" x2="16" y2="17"/>`,
    grid:     `<rect x="3" y="3" width="7" height="7"/>
               <rect x="14" y="3" width="7" height="7"/>
               <rect x="14" y="14" width="7" height="7"/>
               <rect x="3" y="14" width="7" height="7"/>`,
    star:     `<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>`,
    alert:    `<circle cx="12" cy="12" r="10"/>
               <line x1="12" y1="8" x2="12" y2="12"/>
               <line x1="12" y1="16" x2="12.01" y2="16"/>`,
    radio:    `<circle cx="12" cy="12" r="3"/>
               <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>`,
    zap:      `<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>`,
    layers:   `<polygon points="12 2 2 7 12 12 22 7 12 2"/>
               <polyline points="2 17 12 22 22 17"/>
               <polyline points="2 12 12 17 22 12"/>`,
    settings: `<circle cx="12" cy="12" r="3"/>
               <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>`,
    users:    `<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
               <circle cx="9" cy="7" r="4"/>
               <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
               <path d="M16 3.13a4 4 0 0 1 0 7.75"/>`,
    database: `<ellipse cx="12" cy="5" rx="9" ry="3"/>
               <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
               <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>`,
  };

  /* ── Renderer ── */
  const grid    = document.getElementById('navGrid');
  const countEl = document.getElementById('cardCount');

  function buildCard(tool, idx) {
    const btn = document.createElement('button');
    btn.className = 'nav-card';
    btn.setAttribute('data-accent', tool.accent);
    btn.addEventListener('click', () => navigateTo(tool.action));
    btn.innerHTML = `
      <span class="card-num">${String(idx + 1).padStart(2, '0')}</span>
      <div class="card-icon-ring">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          ${ICONS[tool.icon] || ICONS.file}
        </svg>
      </div>
      <span class="card-label">${tool.label}</span>
      <div class="card-bar"></div>`;
    return btn;
  }

  function renderGrid() {
    grid.innerHTML = '';
    for (let r = 0; r * 3 < TOOLS.length; r++) {
      const row = document.createElement('div');
      row.className = 'grid-row';
      TOOLS.slice(r * 3, r * 3 + 3).forEach((tool, c) => {
        row.appendChild(buildCard(tool, r * 3 + c));
      });
      grid.appendChild(row);
    }
    grid.querySelectorAll('.nav-card').forEach((card, i) => {
      const delay = 620 + i * 120;
      card.style.animationDelay = delay + 'ms';
      setTimeout(() => card.classList.add('visible'), delay);
    });
    countEl.textContent = `${TOOLS.length} MODULES`;
  }

  renderGrid();
</script>
</body>
</html>
