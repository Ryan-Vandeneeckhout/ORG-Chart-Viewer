<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="CommandGridPro is a tactical browser-based launcher for command support tools including CSV comparison, PDF workflows, and org chart utilities."/>
  <meta name="theme-color" content="#00ffd1"/>
  <meta property="og:title" content="CommandGridPro"/>
  <meta property="og:description" content="CommandGridPro is a tactical browser-based launcher for command support tools including CSV comparison, PDF workflows, and org chart utilities."/>
  <meta property="og:type" content="website"/>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.svg"/>
  <link rel="manifest" href="site.webmanifest"/>

  <title>CommandGridPro — Tactical Command Toolkit</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    /* ── Accent colour palette ── */
    :root {
      --c-teal:   #2dd4bf;
      --c-orange: #fb923c;
      --c-violet: #a78bfa;
      --c-gold:   #fbbf24;
      --c-sky:    #38bdf8;
      --c-rose:   #fb7185;
      --c-lime:   #a3e635;
      --c-amber:  #f59e0b;
      --c-cyan:   #22d3ee;
      --c-white: White; 
    }

    /* ── Default coloured state ── */
    .nav-card[data-accent="teal"]   { --ac: var(--c-teal);   }
    .nav-card[data-accent="orange"] { --ac: var(--c-orange); }
    .nav-card[data-accent="violet"] { --ac: var(--c-violet); }
    .nav-card[data-accent="gold"]   { --ac: var(--c-gold);   }
    .nav-card[data-accent="sky"]    { --ac: var(--c-sky);    }
    .nav-card[data-accent="rose"]   { --ac: var(--c-rose);   }
    .nav-card[data-accent="lime"]   { --ac: var(--c-lime);   }
    .nav-card[data-accent="amber"]  { --ac: var(--c-amber);  }
    .nav-card[data-accent="cyan"]   { --ac: var(--c-cyan);   }

    .nav-card {
      background: color-mix(in srgb, var(--ac, #2dd4bf) 14%, #0d1117) !important;
      border-color: color-mix(in srgb, var(--c-white, white) 45%, transparent) !important;
      transition: box-shadow 0.25s ease, transform 0.2s ease, background 0.25s ease !important;
    }

    .nav-card .card-icon-ring {
      border-color: color-mix(in srgb, var(--ac, #2dd4bf) 50%, transparent) !important;
      background: color-mix(in srgb, var(--ac, #2dd4bf) 12%, transparent) !important;
    }

    .nav-card svg {
      stroke: var(--c-white, white) !important;
    }

    .nav-card .card-bar {
      background: linear-gradient(90deg, transparent, var(--ac, #2dd4bf), transparent) !important;
      opacity: 0.9;
      height: 3px;
    }

    .nav-card .card-label {
      color: color-mix(in srgb, var(--ac, #2dd4bf) 78%, #e2e8f0) !important;
      text-shadow: 0 0 12px color-mix(in srgb, var(--ac, #2dd4bf) 14%, transparent);
    }

    /* ── Hover: glow activates ── */
    .nav-card:hover {
      background: color-mix(in srgb, var(--ac, #2dd4bf) 22%, #0d1117) !important;
      border-color: color-mix(in srgb, var(--ac, #2dd4bf) 75%, transparent) !important;
      box-shadow:
        0 0 16px color-mix(in srgb, var(--ac, #2dd4bf) 45%, transparent),
        0 0 40px color-mix(in srgb, var(--ac, #2dd4bf) 20%, transparent),
        inset 0 0 20px color-mix(in srgb, var(--ac, #2dd4bf) 8%, transparent) !important;
      transform: translateY(-3px) scale(1.02) !important;
    }

    .nav-card:hover .card-icon-ring {
      border-color: color-mix(in srgb, var(--ac, #2dd4bf) 80%, transparent) !important;
      background: color-mix(in srgb, var(--ac, #2dd4bf) 20%, transparent) !important;
      box-shadow: 0 0 12px color-mix(in srgb, var(--ac, #2dd4bf) 40%, transparent) !important;
    }

    .nav-card:hover .card-bar {
      opacity: 1;
      box-shadow: 0 0 8px var(--ac, #2dd4bf) !important;
    }

    .nav-card:hover .card-label {
      color: var(--ac, #2dd4bf) !important;
    }


    .nav-card .card-icon-ring {
      width: 58px !important;
      height: 58px !important;
      border-radius: 18px !important;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--ac, #2dd4bf) 8%, transparent);
    }
    .nav-card .card-icon-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 30%, color-mix(in srgb, var(white, white) 28%, transparent), transparent 58%),
        linear-gradient(135deg, color-mix(in srgb, var(white, white) 10%, transparent), transparent 70%);
      opacity: .95;
    }
    .nav-card .card-icon-ring::after {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid color-mix(in srgb, var(--ac, #2dd4bf) 22%, transparent);
      border-radius: 12px;
      opacity: .9;
    }
    .nav-card svg {
      position: relative;
      z-index: 1;
      width: 26px;
      height: 26px;
      stroke-width: 1.8 !important;
      filter: drop-shadow(0 0 8px color-mix(in srgb, var(--ac, #2dd4bf) 24%, transparent));
    }


    .tool-hover-panel {
      width: min(100%, 1040px);
      margin: 20px auto 0;
      min-height: 116px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }

    .tool-hover-panel.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tool-hover-panel__inner {
      border-radius: 20px;
      border: 1px solid color-mix(in srgb, var(--theme-accent, #22d3ee) 35%, transparent);
      background:
        linear-gradient(180deg,
          color-mix(in srgb, var(--theme-accent, #22d3ee) 10%, rgba(13, 17, 23, 0.96)),
          rgba(13, 17, 23, 0.92)
        );
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--theme-accent, #22d3ee) 8%, transparent) inset,
        0 14px 30px rgba(0, 0, 0, 0.22);
      padding: 18px 22px;
    }

    .tool-hover-panel__eyebrow {
      margin: 0 0 8px;
      font-size: 0.72rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--theme-accent, #22d3ee) 72%, #cbd5e1);
    }

    .tool-hover-panel__title {
      font-size: 1rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 6px;
    }

    .tool-hover-panel__text {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #cbd5e1;
      max-width: 72ch;
    }

  </style>
</head>
<body>

<div class="page">

  <header data-cgp-header data-hide-back="true"></header>

  <main>
    <p class="section-label">— SELECT MODULE —</p>
    <div class="nav-grid" id="navGrid"></div>

    <div class="tool-hover-panel" id="toolHoverPanel" aria-live="polite" hidden>
      <div class="tool-hover-panel__inner">
        <p class="tool-hover-panel__eyebrow">— MODULE OVERVIEW —</p>
        <div class="tool-hover-panel__title" id="toolHoverTitle"></div>
        <div class="tool-hover-panel__text" id="toolHoverText"></div>
      </div>
    </div>
  </main>

  <footer data-cgp-footer data-version="v1.0.0">
    <!-- loaded by shared.js -->
    <!-- index page shows card count inline; injected by page script below -->
  </footer>

</div>
<script src="shared.js"></script>
<script>

  /* ================================================================
     TOOL CONFIG — edit this array to add/change/reorder cards.

     Fields:
       label   {string}  Text shown on the card
       accent  {string}  Colour: teal | orange | violet | gold |
                         sky | rose | lime | amber | cyan
       icon    {string}  Icon key (see ICONS map below)
       action  {string}  Filename of the destination page
  ================================================================ */
  const TOOLS = [
    {
      label: 'CSV Compare',
      accent: 'teal',
      icon: 'compare',
      action: 'tool-pdf.html',
      description: 'Compare CSV datasets, spot differences quickly, and review changed records in a cleaner command-ready format.'
    },
    {
      label: 'PDF Form Filler',
      accent: 'violet',
      icon: 'form',
      action: 'tool-cgp-pdf.html',
      description: 'Populate PDF forms faster using uploaded data and reduce manual entry for repetitive document workflows.'
    },
    {
      label: 'Command Pro All',
      accent: 'sky',
      icon: 'command',
      action: 'tool-cgp.html',
      description: 'Open the full CommandGridPro workspace with integrated tools, utilities, and command support modules in one place.'
    },
    {
      label: 'Org Chart',
      accent: 'cyan',
      icon: 'org',
      action: 'tool-orgchart.html',
      description: 'Build, inspect, and navigate org structures from CSV data with visual reporting chains and card-based layouts.'
    },
    {
      label: 'Settings',
      accent: 'gold',
      icon: 'control',
      action: 'settings.html',
      description: 'Adjust themes, defaults, and interface preferences to tailor the toolkit to your workflow.'
    },
  ];

  /* ================================================================
     ICON LIBRARY — SVG path strings for a 24×24 viewBox.
     Add new keys here and reference them via TOOLS[n].icon
  ================================================================ */
  const ICONS = {
    compare: `<path d="M7 7h10"/>
              <path d="M13 3l4 4-4 4"/>
              <path d="M17 17H7"/>
              <path d="M11 13l-4 4 4 4"/>
              <rect x="4" y="4" width="16" height="16" rx="3" opacity="0.18"/>`,
    form:    `<path d="M8 4h6l4 4v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
              <path d="M14 4v4h4"/>
              <path d="M9 12h6"/>
              <path d="M9 16h3"/>
              <path d="M15.5 15.5l2 2 3.5-4"/>`,
    command: `<rect x="3" y="3" width="18" height="18" rx="4"/>
              <path d="M8 8h8"/>
              <path d="M8 12h8"/>
              <path d="M8 16h5"/>
              <circle cx="17" cy="16" r="2.5"/>
              <path d="M17 12v1.5"/>`,
    org:     `<circle cx="12" cy="5.5" r="2.5"/>
              <circle cx="6" cy="18" r="2.5"/>
              <circle cx="18" cy="18" r="2.5"/>
              <path d="M12 8v4"/>
              <path d="M7 14h10"/>
              <path d="M6 15.5v0"/>
              <path d="M18 15.5v0"/>
              <path d="M12 12l-6 3"/>
              <path d="M12 12l6 3"/>`,
    control: `<path d="M4 7h8"/>
              <path d="M4 17h12"/>
              <path d="M12 7h8"/>
              <path d="M16 17h4"/>
              <circle cx="15" cy="7" r="2.5"/>
              <circle cx="13" cy="17" r="2.5"/>`,
    file:     `<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
               <polyline points="14 2 14 8 20 8"/>
               <line x1="8" y1="13" x2="16" y2="13"/>
               <line x1="8" y1="17" x2="16" y2="17"/>`
  };

  /* ── Renderer ── */
  const grid = document.getElementById('navGrid');
  const hoverPanel = document.getElementById('toolHoverPanel');
  const hoverTitle = document.getElementById('toolHoverTitle');
  const hoverText = document.getElementById('toolHoverText');

  let hoverReady = false;
  let activeHoverCard = null;

  function showToolPanel(tool, card) {
    if (!hoverReady || !tool || !card) return;
    activeHoverCard = card;
    hoverTitle.textContent = tool.label;
    hoverText.textContent = tool.description || '';
    hoverPanel.hidden = false;
    requestAnimationFrame(() => hoverPanel.classList.add('is-visible'));
  }

  function hideToolPanel(card) {
    if (card && activeHoverCard && card !== activeHoverCard) return;
    activeHoverCard = null;
    hoverPanel.classList.remove('is-visible');
    const finishHide = () => {
      if (!activeHoverCard) {
        hoverPanel.hidden = true;
        hoverTitle.textContent = '';
        hoverText.textContent = '';
      }
      hoverPanel.removeEventListener('transitionend', finishHide);
    };
    hoverPanel.addEventListener('transitionend', finishHide);
  }

  function buildCard(tool, idx) {
    const btn = document.createElement('button');
    btn.className = 'nav-card';
    btn.type = 'button';
    btn.setAttribute('data-accent', tool.accent);
    btn.addEventListener('click', () => navigateTo(tool.action));
    btn.addEventListener('mouseenter', () => showToolPanel(tool, btn));
    btn.addEventListener('focus', () => showToolPanel(tool, btn));
    btn.addEventListener('mouseleave', () => hideToolPanel(btn));
    btn.addEventListener('blur', () => hideToolPanel(btn));
    btn.innerHTML = `
      <div class="card-icon-ring">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          ${ICONS[tool.icon] || ICONS.file}
        </svg>
      </div>
      <span class="card-label">${tool.label}</span>
      <div class="card-bar"></div>`;
    return btn;
  }

  function renderGrid() {
    grid.innerHTML = '';
    hoverReady = false;
    hideToolPanel();

    for (let r = 0; r * 3 < TOOLS.length; r++) {
      const row = document.createElement('div');
      row.className = 'grid-row';
      TOOLS.slice(r * 3, r * 3 + 3).forEach((tool, c) => {
        row.appendChild(buildCard(tool, r * 3 + c));
      });
      grid.appendChild(row);
    }

    const cards = [...grid.querySelectorAll('.nav-card')];
    let maxDelay = 0;

    cards.forEach((card, i) => {
      const delay = 620 + i * 120;
      maxDelay = Math.max(maxDelay, delay);
      card.style.animationDelay = delay + 'ms';
      setTimeout(() => card.classList.add('visible'), delay);
    });

    setTimeout(() => {
      hoverReady = true;
    }, maxDelay + 120);
  }

  renderGrid();
</script>
</body>
</html>
